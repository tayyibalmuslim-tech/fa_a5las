<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سلسلة فقه الإخلاص - فهرس الحلقات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#b8860b;
    --gold-light:#d4a537;
    --green-deep:#1f4d3a;
    --green-mid:#2e6b52;
    --brown-dark:#3a2c1f;
    --cream:#faf6ec;
    --cream-dark:#f0e8d4;
    --ink:#2b241a;
    --card-border:#e3d6b0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Cairo', sans-serif;
    background:var(--cream);
    color:var(--ink);
    line-height:1.8;
  }

  /* ===== HEADER ===== */
  header{
    background:linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 55%, var(--brown-dark) 100%);
    color:#fdf8ec;
    padding:60px 20px 50px;
    text-align:center;
    position:relative;
    overflow:hidden;
    border-bottom:6px solid var(--gold);
  }
  header::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(212,165,55,0.05) 0, rgba(212,165,55,0.05) 2px, transparent 2px, transparent 30px);
    pointer-events:none;
  }
  header .kicker{
    display:inline-block;
    background:rgba(212,165,55,0.18);
    border:1px solid var(--gold-light);
    color:var(--gold-light);
    padding:6px 22px;
    border-radius:30px;
    font-size:0.9rem;
    font-weight:600;
    margin-bottom:20px;
    letter-spacing:1px;
  }
  header h1{
    font-size:2.6rem;
    font-weight:900;
    margin-bottom:14px;
    text-shadow:0 2px 10px rgba(0,0,0,0.25);
  }
  header p.desc{
    font-size:1.08rem;
    color:#e8dfc4;
    max-width:640px;
    margin:0 auto;
    font-weight:300;
  }
  .header-ornament{
    margin-top:26px;
    font-size:1.5rem;
    color:var(--gold-light);
    letter-spacing:10px;
  }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap{
    max-width:850px;
    margin:-28px auto 0;
    position:relative;
    z-index:3;
    padding:0 20px;
  }
  .progress-card{
    background:#fff;
    border:1px solid var(--card-border);
    border-radius:14px;
    padding:18px 24px;
    box-shadow:0 8px 22px rgba(59,44,20,0.09);
    display:flex;
    align-items:center;
    gap:16px;
  }
  .progress-card .txt{
    font-size:0.92rem;
    font-weight:600;
    color:var(--green-deep);
    white-space:nowrap;
  }
  .progress-track{
    flex:1;
    height:10px;
    background:var(--cream-dark);
    border-radius:20px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
    border-radius:20px;
    width:3.33%;
    transition:width 0.4s ease;
  }

  /* ===== GRID ===== */
  main{
    max-width:1050px;
    margin:0 auto;
    padding:50px 20px 70px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:20px;
  }

  .ep-card{
    display:block;
    text-decoration:none;
    color:inherit;
    background:#fff;
    border:1px solid var(--card-border);
    border-radius:14px;
    padding:22px 20px;
    position:relative;
    overflow:hidden;
    transition:transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    box-shadow:0 4px 12px rgba(59,44,20,0.05);
  }
  .ep-card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 26px rgba(59,44,20,0.14);
    border-color:var(--gold-light);
  }
  .ep-card .ep-num{
    font-family:'Amiri', serif;
    font-size:2.1rem;
    font-weight:700;
    color:var(--card-border);
    line-height:1;
    margin-bottom:10px;
    transition:color 0.18s ease;
  }
  .ep-card:hover .ep-num{ color:var(--gold-light); }

  .ep-card.available .ep-num{ color:var(--gold); }

  .ep-card .ep-title{
    font-size:1.02rem;
    font-weight:700;
    color:var(--ink);
    margin-bottom:8px;
  }
  .ep-card .ep-status{
    font-size:0.8rem;
    font-weight:600;
    display:inline-flex;
    align-items:center;
    gap:5px;
    padding:4px 10px;
    border-radius:20px;
  }
  .ep-card.available .ep-status{
    background:#eef6f1;
    color:var(--green-mid);
  }
  .ep-card.locked .ep-status{
    background:var(--cream-dark);
    color:#9a8c6a;
  }
  .ep-card.locked{
    opacity:0.75;
  }
  .ep-card::after{
    content:"";
    position:absolute;
    top:0; right:0;
    width:5px;
    height:100%;
    background:var(--card-border);
    transition:background 0.18s ease;
  }
  .ep-card.available::after{ background:var(--gold); }
  .ep-card:hover::after{ background:var(--gold-light); }

  .ep-card .ribbon{
    position:absolute;
    top:14px;
    left:14px;
    font-size:1.1rem;
  }

  /* ===== SECTION TITLE ===== */
  .section-title{
    display:flex;
    align-items:center;
    gap:12px;
    margin:0 0 22px;
    color:var(--green-deep);
    font-size:1.15rem;
    font-weight:700;
  }
  .section-title::before,.section-title::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--card-border);
  }

  footer{
    background:linear-gradient(135deg, var(--brown-dark) 0%, var(--green-deep) 100%);
    color:#f0e8d4;
    text-align:center;
    padding:40px 20px;
  }
  footer .dua{
    font-family:'Amiri', serif;
    font-size:1.15rem;
    color:var(--gold-light);
  }

  @media (max-width:600px){
    header h1{ font-size:1.9rem; }
    .progress-card{ flex-wrap:wrap; }
    .grid{ grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:14px; }
  }
</style>
</head>
<body>

<header>
  <div class="kicker">مكتبة الدروس</div>
  <h1>سلسلة فقه الإخلاص</h1>
  <p class="desc">سلسلة حلقات في رحلة فهم أصل من أعظم أصول الدين — من فقه الفكرة، إلى معناها في اللسان والوحي، إلى معوقاتها، إلى أثرها في تفاصيل الحياة اليومية.</p>
  <div class="header-ornament">﴾ ۝ ﴿</div>
</header>

<div class="progress-wrap">
  <div class="progress-card">
    <span class="txt">جارٍ التحميل...</span>
    <div class="progress-track"><div class="progress-fill"></div></div>
  </div>
</div>

<main>
  <h2 class="section-title">الحلقات</h2>
  <div class="grid" id="episodes-grid"></div>
</main>

<footer>
  <p class="dua">اللهم اجعل أعمالنا كلها خالصة لوجهك الكريم</p>
</footer>

<script>
/* ============================================================
   ⭐ المصدر الوحيد للحقيقة: أضف/احذف/رتّب هنا فقط.
   العداد الكلي، نسبة الشريط، وترقيم الحلقات كلها تُحسب
   تلقائيًا من طول وترتيب هذه المصفوفة — مفيش أرقام ثابتة
   في أي مكان تاني بالملف.
   
   لإضافة حلقة جديدة: زوّد سطر جديد في المكان المناسب من
   القائمة (بالترتيب اللي تحب تظهر بيه)، وحدّد available.
   ============================================================ */
const episodesList = [
  { title: "الدرس الأول: لماذا فقه الإخلاص؟", available: true,  file: "حلقات/حلقة_01.html" },
  { title: "الحلقة الثانية",                    available: false, file: "حلقات/حلقة_02.html" },
  { title: "الحلقة الثالثة",                     available: false, file: "حلقات/حلقة_03.html" },
  { title: "الحلقة الرابعة",                     available: false, file: "حلقات/حلقة_04.html" },
  { title: "الحلقة الخامسة",                     available: false, file: "حلقات/حلقة_05.html" },
  { title: "الحلقة السادسة",                     available: false, file: "حلقات/حلقة_06.html" },
  { title: "الحلقة السابعة",                     available: false, file: "حلقات/حلقة_07.html" },
  { title: "الصدق ومراتبه",                      available: true,  file: "حلقات/حلقة_08.html" },
  { title: "الحلقة التاسعة",                     available: false, file: "حلقات/حلقة_09.html" },
  { title: "الحلقة العاشرة",                     available: false, file: "حلقات/حلقة_10.html" },
  { title: "الحلقة الحادية عشرة",                available: false, file: "حلقات/حلقة_11.html" },
  { title: "الحلقة الثانية عشرة",                available: false, file: "حلقات/حلقة_12.html" },
  { title: "الحلقة الثالثة عشرة",                available: false, file: "حلقات/حلقة_13.html" },
  { title: "الحلقة الرابعة عشرة",                available: false, file: "حلقات/حلقة_14.html" },
  { title: "الحلقة الخامسة عشرة",                available: false, file: "حلقات/حلقة_15.html" },
  { title: "الحلقة السادسة عشرة",                available: false, file: "حلقات/حلقة_16.html" },
  { title: "الحلقة السابعة عشرة",                available: false, file: "حلقات/حلقة_17.html" },
  { title: "الحلقة الثامنة عشرة",                available: false, file: "حلقات/حلقة_18.html" },
  { title: "الحلقة التاسعة عشرة",                available: false, file: "حلقات/حلقة_19.html" },
  { title: "الحلقة العشرون",                     available: false, file: "حلقات/حلقة_20.html" },
  { title: "الحلقة الحادية والعشرون",            available: false, file: "حلقات/حلقة_21.html" },
  { title: "الحلقة الثانية والعشرون",            available: false, file: "حلقات/حلقة_22.html" },
  { title: "الحلقة الثالثة والعشرون",            available: false, file: "حلقات/حلقة_23.html" },
  { title: "الحلقة الرابعة والعشرون",            available: false, file: "حلقات/حلقة_24.html" },
  { title: "الحلقة الخامسة والعشرون",            available: false, file: "حلقات/حلقة_25.html" },
  { title: "الحلقة السادسة والعشرون",            available: false, file: "حلقات/حلقة_26.html" },
  { title: "الحلقة السابعة والعشرون",            available: false, file: "حلقات/حلقة_27.html" },
  { title: "الحلقة الثامنة والعشرون",            available: false, file: "حلقات/حلقة_28.html" },
  { title: "الحلقة التاسعة والعشرون",            available: false, file: "حلقات/حلقة_29.html" },
  { title: "الحلقة الثلاثون",                    available: false, file: "حلقات/حلقة_30.html" },
  { title: "الحلقة الحادية والثلاثون",           available: false, file: "حلقات/حلقة_31.html" },
];

function arabicNumeral(n){
  const map = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
  return String(n).split("").map(d => map[parseInt(d)]).join("");
}

// ✅ الترقيم يُحسب تلقائيًا من ترتيب العناصر في المصفوفة (index + 1)
const episodesData = episodesList.map((ep, idx) => ({
  num: idx + 1,
  ...ep
}));

// ✅ العدد الكلي = طول المصفوفة نفسها (يتحدث تلقائيًا عند الإضافة/الحذف)
const totalCount = episodesData.length;

const grid = document.getElementById('episodes-grid');
episodesData.forEach(ep => {
  const a = document.createElement('a');
  a.href = ep.file;
  a.className = `ep-card ${ep.available ? 'available' : 'locked'}`;
  a.innerHTML = `
    <div class="ep-num">${arabicNumeral(ep.num)}</div>
    <div class="ep-title">${ep.title}</div>
    <span class="ep-status">${ep.available ? '✅ متاحة' : '🕊️ قريبًا'}</span>
  `;
  grid.appendChild(a);
});

// ✅ عدد المتاح ونسبة الشريط كلها محسوبة تلقائيًا من totalCount
const availableCount = episodesData.filter(e => e.available).length;
document.querySelector('.progress-fill').style.width = (availableCount / totalCount * 100) + '%';
document.querySelector('.progress-card .txt').textContent =
  `${arabicNumeral(availableCount)} من ${arabicNumeral(totalCount)} حلقة متاحة`;
</script>

</body>
</html>
