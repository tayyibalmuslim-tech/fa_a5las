<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحلقة 20 - فقه الإخلاص - فقه الإخلاص</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#b8860b;
    --gold-light:#d4a537;
    --green-deep:#1f4d3a;
    --green-mid:#2e6b52;
    --brown-dark:#3a2c1f;
    --cream:#faf6ec;
    --cream-dark:#f0e8d4;
    --ink:#2b241a;
    --card-border:#e3d6b0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Cairo', sans-serif;
    background:var(--cream);
    color:var(--ink);
    line-height:1.9;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  header{
    background:linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 55%, var(--brown-dark) 100%);
    color:#fdf8ec;
    padding:40px 20px 32px;
    text-align:center;
    position:relative;
    overflow:hidden;
    border-bottom:6px solid var(--gold);
  }
  header::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(212,165,55,0.05) 0, rgba(212,165,55,0.05) 2px, transparent 2px, transparent 30px);
    pointer-events:none;
  }
  .series-badge{
    display:inline-block;
    background:rgba(212,165,55,0.18);
    border:1px solid var(--gold-light);
    color:var(--gold-light);
    padding:6px 20px;
    border-radius:30px;
    font-size:0.9rem;
    font-weight:600;
    margin-bottom:18px;
    letter-spacing:0.5px;
  }
  header h1{
    font-size:2rem;
    font-weight:900;
    text-shadow:0 2px 10px rgba(0,0,0,0.25);
  }
  .back-link{
    display:inline-block;
    margin-top:18px;
    color:var(--gold-light);
    text-decoration:none;
    font-weight:600;
    font-size:0.95rem;
    border:1px solid var(--gold-light);
    padding:8px 18px;
    border-radius:8px;
    transition:background 0.15s, color 0.15s;
  }
  .back-link:hover{
    background:var(--gold-light);
    color:var(--brown-dark);
  }

  main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:60px 20px;
  }
  .empty-card{
    background:#fff;
    border:1px dashed var(--card-border);
    border-radius:18px;
    padding:50px 40px;
    max-width:520px;
    text-align:center;
    box-shadow:0 8px 24px rgba(59,44,20,0.07);
  }
  .empty-card .icon{
    font-size:3rem;
    margin-bottom:18px;
    display:block;
    color:var(--gold);
  }
  .empty-card h2{
    color:var(--green-deep);
    font-size:1.3rem;
    margin-bottom:12px;
  }
  .empty-card p{
    color:#6b6152;
    font-size:0.98rem;
  }
  .header-ornament{
    margin-top:16px;
    font-size:1.2rem;
    color:var(--gold-light);
    letter-spacing:8px;
  }

  footer{
    background:linear-gradient(135deg, var(--brown-dark) 0%, var(--green-deep) 100%);
    color:#f0e8d4;
    text-align:center;
    padding:22px 20px;
    font-size:0.85rem;
    opacity:0.85;
  }
</style>
</head>
<body>

<header>
  <div class="series-badge">الدرس 20 &middot; سلسلة فقه الإخلاص</div>
  <h1>الحلقة 20 - فقه الإخلاص</h1>
  <div class="header-ornament">﴾ ۝ ﴿</div>
  <a class="back-link" href="../index.html">→ الرجوع لفهرس الحلقات</a>
</header>

<main>
  <div class="empty-card">
    <span class="icon">🕊️</span>
    <h2>هذه الحلقة لم تُضَف بعد</h2>
    <p>سيتم رفع محتوى هذه الحلقة قريبًا بإذن الله، بنفس منهجية التلخيص التعليمي وبطاقات المراجعة (أنكي) المعتمدة في السلسلة.</p>
  </div>
</main>

<footer>
  سلسلة فقه الإخلاص &middot; الحلقة 20 - فقه الإخلاص
</footer>

</body>
</html>
